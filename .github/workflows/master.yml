name: build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  desktop-and-core:
    runs-on: windows-latest
    strategy:
      matrix:
        configuration: [Debug, Release]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - run: dotnet test Tests.Core/Tests.Core.csproj -c ${{ matrix.configuration }}
      - run: dotnet build SkiaMonoGameRendering/SkiaMonoGameRendering.csproj -c ${{ matrix.configuration }}
      - run: dotnet build SkiaMonoGameRendering.WindowsDX/SkiaMonoGameRendering.WindowsDX.csproj -c ${{ matrix.configuration }}
      - run: dotnet pack SkiaMonoGameRendering/SkiaMonoGameRendering.csproj -c ${{ matrix.configuration }}

  webgl-functional:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.415
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Tests.Kni.WebGL/package-lock.json
      - name: Bootstrap patched KNI
        shell: pwsh
        run: ./eng/bootstrap-kni-webgl.ps1
      - name: Install WASM toolchain
        run: dotnet workload install wasm-tools-net8
      - name: Build native WASM Release
        run: dotnet build Sample.Kni.WebGL/Sample.Kni.WebGL.csproj -c Release
      - name: Install browser tests
        working-directory: Tests.Kni.WebGL
        run: |
          npm ci
          npx playwright install --with-deps chromium firefox webkit
      - name: Functional browser tests
        working-directory: Tests.Kni.WebGL
        run: npm test
      - name: Publish trimmed WASM AOT
        run: dotnet publish Sample.Kni.WebGL/Sample.Kni.WebGL.csproj -c Release --no-restore -p:RunAOTCompilation=true -p:PublishTrimmed=true
      - name: Pack patched KNI and WebGL library
        shell: pwsh
        run: ./eng/pack-kni-webgl.ps1
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: webgl-browser-artifacts
          path: |
            Tests.Kni.WebGL/playwright-report
            Tests.Kni.WebGL/test-results
            .artifacts/packages
